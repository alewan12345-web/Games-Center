<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Party | Memory Match</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
  <div class="scanlines"></div>
  <header class="topbar">
    <a class="logo" href="../index.html">PIXEL PARTY</a>
    <nav class="nav">
      <a href="../index.html">Home</a>
      <a href="../games.html">Games</a>
    </nav>
  </header>

  <main class="container game-page">
    <section class="hero small">
      <p class="tag">MEMORY MATCH</p>
      <h1>Memory Match</h1>
      <p class="lead">Flip cards and clear all pairs with the fewest moves.</p>
    </section>
    <section class="game-shell">
      <div class="hud">
        <span>Moves: <strong id="moves">0</strong></span>
        <span>Pairs: <strong id="pairs">0/8</strong></span>
      </div>
      <div id="memory-board" class="memory-board" aria-label="Memory game board"></div>
      <div class="controls">
        <button id="restart" class="btn">Restart</button>
        <a class="btn" href="../games.html">Back To Games</a>
      </div>
    </section>
  </main>

  <script src="../scripts/main.js"></script>
  <script src="../scripts/memory.js"></script>
</body>
</html>
