<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Party | Neon Pong</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
  <div class="scanlines"></div>
  <header class="topbar">
    <a class="logo" href="../index.html">PIXEL PARTY</a>
    <nav class="nav">
      <a href="../index.html">Home</a>
      <a href="../games.html">Games</a>
    </nav>
  </header>

  <main class="container game-page">
    <section class="hero small">
      <p class="tag">NEON PONG</p>
      <h1>Neon Pong</h1>
      <p class="lead">W/S or Arrow Up/Down to move your paddle.</p>
    </section>
    <section class="game-shell">
      <div class="hud">
        <span>You: <strong id="score-you">0</strong></span>
        <span>Bot: <strong id="score-bot">0</strong></span>
      </div>
      <canvas id="pong-canvas" width="800" height="420" aria-label="Pong game"></canvas>
      <div class="controls">
        <button id="restart" class="btn">Restart</button>
        <a class="btn" href="../games.html">Back To Games</a>
      </div>
    </section>
  </main>

  <script src="../scripts/main.js"></script>
  <script src="../scripts/pong.js"></script>
</body>
</html>
