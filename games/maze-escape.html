<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Party | Maze Escape</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
  <div class="scanlines"></div>
  <header class="topbar">
    <a class="logo" href="../index.html">PIXEL PARTY</a>
    <nav class="nav">
      <a href="../index.html">Home</a>
      <a href="../games.html">Games</a>
    </nav>
  </header>
  <main class="container game-page">
    <section class="hero small">
      <p class="tag">MAZE ESCAPE</p>
      <h1>Maze Escape</h1>
      <p class="lead">Use arrow keys or WASD to reach the glowing exit.</p>
    </section>
    <section class="game-shell">
      <div class="hud">
        <span>Moves: <strong id="moves">0</strong></span>
        <span>Status: <strong id="status">Live</strong></span>
      </div>
      <canvas id="maze-canvas" width="480" height="480" aria-label="Maze Escape game"></canvas>
      <div class="controls">
        <button id="restart" class="btn">Restart</button>
        <a class="btn" href="../games.html">Back To Games</a>
      </div>
    </section>
  </main>
  <script src="../scripts/main.js"></script>
  <script src="../scripts/maze-escape.js"></script>
</body>
</html>
